<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide Heading  and Mouse Position</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $("h1,h2,h3,h4,h5,h6").click(function(){
                $(this).hide();
            });

            $(document).mousemove(function(event){
                $("#pos").text("Left:" +event.pageeX + "Top:" + event.pageY)
            });
        });
    </script>
</head>
<body>
    <h1>Heading 1</h1>
     <h2>Heading 2</h2>
      <h3>Heading 3</h3>

    <p id="pos"></p>
</body>
</html>
